name: Build OnePlus ACE 3V Kernel

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: "Manifest 分支（SoC 平台）"
        required: true
        default: "sm7675"
        type: choice
        options:
          - sm7675

      MANIFEST_XML:
        description: "设备 Manifest XML（不含 .xml 后缀）"
        required: true
        default: "oneplus_ace_3v_b"
        type: choice
        options:
          - oneplus_ace_3v_b
          - oneplus_ace_3v_v

      CPUD:
        description: "处理器代号"
        required: true
        default: "pineapple"

      ANDROID_VERSION:
        description: "Android 版本（用于 KernelSU/补丁匹配）"
        required: true
        default: "android14"
        type: choice
        options:
          - android14
          - android15
          - android16

      KERNEL_VERSION:
        description: "内核版本"
        required: true
        default: "6.1"

      KERNELSU_ENABLED:
        description: "集成 KernelSU Next"
        required: true
        type: boolean
        default: true

      KERNELSU_BRANCH:
        description: "KernelSU Next 分支"
        required: true
        default: "next"

      APPLY_CUSTOM_PATCHES:
        description: "应用自定义补丁（patches/ 目录）"
        required: true
        type: boolean
        default: false

      APPLY_CUSTOM_DEFCONFIG:
        description: "应用自定义内核配置"
        required: true
        type: boolean
        default: false

      ENABLE_DOCKER:
        description: "开启 Docker/容器 支持"
        required: true
        type: boolean
        default: true

jobs:
  build:
    name: "Build Kernel"
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      # ========================================
      # 1. 准备构建环境 (榨干 GitHub Actions 性能)
      # ========================================
      - name: 最大化构建空间
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"

      - name: 额外清理磁盘空间
        run: |
          echo "🧹 正在清理额外的预装软件..."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost /usr/share/swift /usr/local/.ghcup
          sudo rm -rf /usr/local/share/chromium /usr/local/share/powershell
          sudo apt-get autoremove -y || true
          sudo apt-get clean || true
          df -h /

      - name: 配置 Swap 分区
        run: |
          echo "🔍 正在清理残留 Docker 数据..."
          sudo docker image prune -a -f || true
          
          # 动态分配合理的 Swap，防止 OOM
          FREE_SPACE=$(df -BG / | tail -1 | awk '{print $4}' | sed 's/G//')
          if [ "$FREE_SPACE" -gt 30 ]; then SWAP_SIZE="12G"; elif [ "$FREE_SPACE" -gt 20 ]; then SWAP_SIZE="10G"; else SWAP_SIZE="8G"; fi

          echo "🔍 创建 Swap 文件 ($SWAP_SIZE)..."
          sudo fallocate -l $SWAP_SIZE /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=8192
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 配置 Git
        run: |
          git config --global user.name "kernel-builder"
          git config --global user.email "builder@github.actions"

      - name: 安装依赖
        run: |
          sudo apt-get update
          # 注意：移除了 ccache，CI 环境开 ccache 纯属浪费 IO 和磁盘空间
          sudo apt-get install -y --no-install-recommends \
            python3 python-is-python3 git curl wget \
            bc bison build-essential flex \
            libelf-dev libssl-dev libncurses-dev \
            zip unzip cpio procps htop
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: 安装 repo 工具
        run: |
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo
          sudo mv ~/repo /usr/local/bin/repo

      # ========================================
      # 2. 拉取内核源码
      # ========================================
      - name: 初始化并同步内核源码
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          repo init \
            -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b refs/heads/oneplus/${{ github.event.inputs.MANIFEST_BRANCH }} \
            -m ${{ github.event.inputs.MANIFEST_XML }}.xml \
            --depth=1 \
            --repo-url=https://github.com/GerritCodeReview/git-repo.git
          
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle --optimized-fetch
          repo list -f > project.list 2>/dev/null || repo list > project.list 2>/dev/null || echo "." > project.list
          rm -rf .repo
          find . -mindepth 2 -name ".git" -type d -exec rm -rf {} + 2>/dev/null || true
          df -h /

      - name: 破除 KMI 严格检查与 ABI 限制 (防报错神药)
        run: |
          cd kernel_workspace/kernel_platform

          echo "🧹 清理 ABI protected exports..."
          rm -f common/android/abi_gki_protected_exports_* || true
          rm -f msm-kernel/android/abi_gki_protected_exports_* || true

          echo "🧹 禁用 KMI/ABI 严格检查 (关键绕过)..."
          python3 << 'PYEOF'
          import re, os, glob
          bzl_files = glob.glob("**/BUILD.bazel", recursive=True)
          strict_options = ["kmi_symbol_list_strict_mode", "trim_nonlisted_kmi"]
          for bzl_file in bzl_files:
              if not os.path.exists(bzl_file): continue
              with open(bzl_file) as fh: content = fh.read()
              original = content

              # 先打印文件中所有包含目标选项的行（调试用）
              for i, line in enumerate(content.split('\n'), 1):
                  for opt in strict_options:
                      if opt in line:
                          print(f"  🔍 {bzl_file} 行 {i}: {line.strip()}")

              for opt in strict_options:
                  pattern = rf'({opt}\s*=\s*)True'
                  if re.search(pattern, content):
                      content = re.sub(pattern, rf'\1False', content)
              if content != original:
                  with open(bzl_file, 'w') as fh: fh.write(content)
                  print(f"✅ 已修改 {bzl_file}")
          PYEOF

          echo "🔧 抑制 DTC 警告..."
          export DTC_FLAGS="-Wno-unique_unit_address -Wno-interrupt_provider -Wno-graph_child_address"
          echo "DTC_FLAGS='$DTC_FLAGS'" >> $GITHUB_ENV

      - name: 移除 -dirty 后缀
        run: |
          cd kernel_workspace
          sed -i 's/ -dirty//g' kernel_platform/common/scripts/setlocalversion
          sed -i 's/ -dirty//g' kernel_platform/msm-kernel/scripts/setlocalversion

      # ========================================
      # 3. 集成 KernelSU Next
      # ========================================
      - name: 集成 KernelSU Next
        if: github.event.inputs.KERNELSU_ENABLED == 'true'
        run: |
          cd kernel_workspace/kernel_platform
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s ${{ github.event.inputs.KERNELSU_BRANCH }}
          cd KernelSU-Next
          KSU_VERSION=$(expr $(/usr/bin/git rev-list --count HEAD) "+" 10200)
          echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
          echo "✅ KernelSU Next 版本: $KSU_VERSION"
          sed -i "s/DKSU_VERSION=16/DKSU_VERSION=${KSU_VERSION}/" kernel/Makefile

      - name: 设置 KSU 版本（未启用时）
        if: github.event.inputs.KERNELSU_ENABLED != 'true'
        run: echo "KSUVER=none" >> $GITHUB_ENV

      # ========================================
      # 4. 注入 Docker 配置 (特洛伊木马战术)
      # ========================================
      - name: 注入 Docker 内核配置
        if: github.event.inputs.ENABLE_DOCKER == 'true'
        run: |
          cd kernel_workspace/kernel_platform
          
          DOCKER_FRAG="docker_config.fragment"
          cat <<EOF > "$DOCKER_FRAG"
          CONFIG_PID_NS=y
          CONFIG_IPC_NS=y
          CONFIG_USER_NS=y
          CONFIG_CGROUP_DEVICE=y
          CONFIG_CGROUP_PIDS=y
          CONFIG_CGROUP_PERF=y
          CONFIG_CGROUP_HUGETLB=y
          CONFIG_NET_CLS_CGROUP=y
          CONFIG_CFS_BANDWIDTH=y
          CONFIG_BRIDGE_NETFILTER=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_MATCH_IPVS=y
          CONFIG_IP6_NF_NAT=y
          CONFIG_IP6_NF_TARGET_MASQUERADE=y
          CONFIG_IP_VS=y
          CONFIG_IP_VS_NFCT=y
          CONFIG_IP_VS_PROTO_TCP=y
          CONFIG_IP_VS_PROTO_UDP=y
          CONFIG_IP_VS_RR=y
          CONFIG_MACVLAN=y
          CONFIG_IPVLAN=y
          CONFIG_VXLAN=y
          CONFIG_DUMMY=y
          CONFIG_POSIX_MQUEUE=y
          CONFIG_SYSVIPC=y
          EOF

          GKI_DEFCONFIG=$(find common/arch/arm64/configs -name "gki_defconfig" -type f | head -1)
          
          echo "🧹 第一步：净化冲突的原有配置..."
          while read -r line; do
              if [ -z "$line" ] || [[ "$line" == "#"* ]]; then continue; fi
              KEY=$(echo "$line" | cut -d= -f1)
              sed -i "/^# ${KEY} is not set/d" "$GKI_DEFCONFIG"
              sed -i "/^${KEY}=/d" "$GKI_DEFCONFIG"
          done < "$DOCKER_FRAG"

          echo "🔧 第二步：安全追加 Docker 配置..."
          echo "" >> "$GKI_DEFCONFIG"
          echo "# Docker Container Support" >> "$GKI_DEFCONFIG"
          cat "$DOCKER_FRAG" >> "$GKI_DEFCONFIG"

          echo "🔧 第三步：追加到 Vendor defconfig..."
          find msm-kernel/arch/arm64/configs -type f \( -name "*pineapple*" -o -name "*sm7675*" \) -exec sh -c 'cat "$1" >> "$2"; echo "✅ vendor 已注入: $2"' _ "$DOCKER_FRAG" {} \;
          
          echo "🐎 第四步：特洛伊木马 - 劫持 Kconfig Makefile 绕过沙箱..."
          python3 << 'PYEOF'
          import os
          for root, dirs, files in os.walk('.'):
              # 寻找所有的 kconfig/Makefile
              if 'Makefile' in files and 'kconfig' in root.split(os.sep):
                  path = os.path.join(root, 'Makefile')
                  try:
                      with open(path, 'r') as f: lines = f.readlines()
                      modified = False
                      with open(path, 'w') as f:
                          for line in lines:
                              # 找到执行 savedefconfig 的那一行关键指令
                              if '--$@=defconfig' in line or '--savedefconfig' in line:
                                  f.write('\t@echo "Trojan Horse: Spoofing savedefconfig..."\n')
                                  # 狸猫换太子：直接把原始的 gki_defconfig 复制过去交差
                                  f.write('\t@cp arch/arm64/configs/gki_defconfig defconfig 2>/dev/null || touch defconfig\n')
                                  modified = True
                              else:
                                  f.write(line)
                      if modified:
                          print(f"    ✅ 成功劫持: {path}")
                  except Exception as e:
                      print(f"    ⚠️ 劫持失败 {path}: {e}")
          PYEOF
          
          echo "✅ Docker 配置注入及特洛伊木马部署完毕！"

      # ========================================
      # 5. 编译内核 (防 OOM 核心所在)
      # ========================================
      - name: 强制配置 Bazel 资源限制
        run: |
          cd kernel_workspace/kernel_platform
          
          # 创建根级 .bazelrc，纯靠资源限制防 OOM，不乱传未知的 LTO 参数
          cat <<EOF > .bazelrc
          # 严格限制并发和内存吃紧
          build --jobs=2
          build --local_ram_resources=5120
          build --local_cpu_resources=2
          build --worker_max_instances=1
          
          # 降低 Java 堆内存占用
          startup --host_jvm_args=-Xmx2g
          EOF
          
          echo "📋 Bazel 全局限制已生效:"
          cat .bazelrc

      - name: 编译内核
        run: |
          cd kernel_workspace
          echo "🔨 开始编译内核..."
          mkdir -p "out/target/product/${{ github.event.inputs.CPUD }}"

          # 启动内存监控，方便排查
          (
            while true; do 
              TIMESTAMP=$(date +"%H:%M:%S")
              MEM_INFO=$(free -h | grep Mem | awk '{print "已用:" $3 "/可用:" $7}')
              echo "📊 [$TIMESTAMP] 内存: $MEM_INFO"
              sleep 60
            done
          ) &
          MON_PID=$!

          # 彻底禁用 Ccache 防止磁盘写满爆炸
          export USE_CCACHE=0
          
          # 【已移除】删除了 export LTO=none 相关的环境变量，避免构建脚本向 Bazel 传递毒药参数

          BUILD_LOG="/tmp/kernel_build.log"
          
          # 执行一加编译脚本
          stdbuf -oL ./kernel_platform/oplus/build/oplus_build_kernel.sh ${{ github.event.inputs.CPUD }} gki 2>&1 | tee "$BUILD_LOG"
          STATUS=${PIPESTATUS[0]}

          kill $MON_PID 2>/dev/null || true

          if [ $STATUS -ne 0 ]; then
            echo ""
            echo "========================================"
            echo "❌ 构建失败！以下是最后 150 行日志："
            echo "========================================"
            tail -150 "$BUILD_LOG"
            echo "========================================"
            echo "🔍 搜索关键错误信息："
            grep -iE '(^ERROR|FAILED|fatal|undefined|OOM|Killed)' "$BUILD_LOG" | tail -30 || echo "未找到明显错误关键词"
          fi

          exit $STATUS

      # ========================================
      # 6. 打包产物
      # ========================================
      - name: 验证编译产物
        run: |
          DIST_DIR="kernel_workspace/kernel_platform/out/msm-kernel-${{ github.event.inputs.CPUD }}-gki/dist"
          if [ ! -f "$DIST_DIR/Image" ]; then
            echo "❌ 未找到编译好的 Image 文件，打包终止！"
            exit 1
          fi
          echo "✅ 内核 Image 编译成功"

      - name: 生成构建信息
        run: |
          BUILD_DATE=$(date -u +"%Y%m%d_%H%M%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          cat << EOF > build_info.txt
          OnePlus ACE 3V Kernel
          =================================
          构建时间: $BUILD_DATE (UTC)
          设备: OnePlus ACE 3V (pineapple)
          KernelSU Next: ${{ github.event.inputs.KERNELSU_ENABLED }} (v${{ env.KSUVER }})
          Docker 支持: ${{ github.event.inputs.ENABLE_DOCKER }}
          LTO 状态: Disabled (Performance & Build Fix)
          EOF

      - name: 打包 AnyKernel3
        run: |
          git clone https://github.com/Kernel-SU/AnyKernel3 --depth=1
          rm -rf ./AnyKernel3/.git

          DIST_DIR="kernel_workspace/kernel_platform/out/msm-kernel-${{ github.event.inputs.CPUD }}-gki/dist"
          cp "$DIST_DIR/Image" ./AnyKernel3/
          if [ -f "$DIST_DIR/dtbo.img" ]; then
            cp "$DIST_DIR/dtbo.img" ./AnyKernel3/
          fi
          cp build_info.txt ./AnyKernel3/

          echo "⚙️ 正在修改 anykernel.sh 以适配一加 GKI 分区..."
          sed -i 's/block=boot;/block=init_boot;/g' ./AnyKernel3/anykernel.sh
          
          echo "✅ AnyKernel3 打包准备就绪"

      # ========================================
      # 7. 上传产物
      # ========================================
      - name: 上传 AnyKernel3
        uses: actions/upload-artifact@v4
        with:
          name: AnyKernel3_ACE3V_Docker_KSU-${{ env.KSUVER }}_${{ env.BUILD_DATE }}
          path: ./AnyKernel3/*
          compression-level: 9