name: Build OnePlus ACE 3V Kernel

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: "Manifest 分支（SoC 平台）"
        required: true
        default: "sm7675"
        type: choice
        options:
          - sm7675

      MANIFEST_XML:
        description: "设备 Manifest XML（不含 .xml 后缀）"
        required: true
        default: "oneplus_ace_3v_b"
        type: choice
        options:
          - oneplus_ace_3v_b
          - oneplus_ace_3v_v

      CPUD:
        description: "处理器代号"
        required: true
        default: "pineapple"

      ANDROID_VERSION:
        description: "Android 版本（用于 KernelSU/补丁匹配）"
        required: true
        default: "android14"
        type: choice
        options:
          - android14
          - android15
          - android16

      KERNEL_VERSION:
        description: "内核版本"
        required: true
        default: "6.1"

      KERNELSU_ENABLED:
        description: "集成 KernelSU Next"
        required: true
        type: boolean
        default: true

      KERNELSU_BRANCH:
        description: "KernelSU Next 分支"
        required: true
        default: "next"

      APPLY_CUSTOM_PATCHES:
        description: "应用自定义补丁（patches/ 目录）"
        required: true
        type: boolean
        default: false

      APPLY_CUSTOM_DEFCONFIG:
        description: "应用自定义内核配置（config/custom_defconfig.fragment）"
        required: true
        type: boolean
        default: false

      ENABLE_DOCKER:
        description: "开启 Docker/容器 支持（内核配置）"
        required: true
        type: boolean
        default: true

jobs:
  build:
    name: "Build Kernel"
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      # ========================================
      # 1. 准备构建环境
      # ========================================
      - name: 最大化构建空间
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"

      - name: 额外清理磁盘空间
        run: |
          echo "🧹 正在清理额外的预装软件..."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost /usr/share/swift /usr/local/.ghcup
          sudo rm -rf /usr/local/share/chromium /usr/local/share/powershell
          sudo apt-get autoremove -y || true
          sudo apt-get clean || true
          echo "📊 清理后可用空间:"
          df -h /

      - name: 配置 Swap 分区
        run: |
          echo "🔍 正在清理残留 Docker 数据..."
          sudo docker image prune -a -f || true
          
          FREE_SPACE=$(df -BG / | tail -1 | awk '{print $4}' | sed 's/G//')
          echo "📊 当前根目录可用空间: ${FREE_SPACE}GB"

          if [ "$FREE_SPACE" -gt 30 ]; then
            SWAP_SIZE="8G"
          elif [ "$FREE_SPACE" -gt 20 ]; then
            SWAP_SIZE="6G"
          else
            SWAP_SIZE="4G"
          fi

          echo "🔍 正在尝试创建 Swap 文件 ($SWAP_SIZE)..."
          sudo fallocate -l $SWAP_SIZE /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
          
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "✅ Swap 配置完成:"
          free -h
          df -h /

      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 配置 Git
        run: |
          git config --global user.name "kernel-builder"
          git config --global user.email "builder@github.actions"

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3 python-is-python3 git curl wget \
            bc bison build-essential ccache flex \
            libelf-dev libssl-dev libncurses-dev \
            zip unzip cpio procps htop
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: 安装 repo 工具
        run: |
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo
          sudo mv ~/repo /usr/local/bin/repo

      # ========================================
      # 2. 拉取内核源码
      # ========================================
      - name: 初始化并同步内核源码
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          echo "::group::repo init"
          repo init \
            -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b refs/heads/oneplus/${{ github.event.inputs.MANIFEST_BRANCH }} \
            -m ${{ github.event.inputs.MANIFEST_XML }}.xml \
            --depth=1 \
            --repo-url=https://github.com/GerritCodeReview/git-repo.git
          echo "::endgroup::"

          echo "::group::repo sync"
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle --optimized-fetch
          echo "::endgroup::"

          echo "📋 生成 project.list（Bazel workspace status 依赖此文件）..."
          repo list -f > project.list 2>/dev/null || repo list > project.list 2>/dev/null || echo "." > project.list

          echo "🗑️ 清理 .repo 目录..."
          rm -rf .repo

          echo "🗑️ 清理源码中的 .git 目录..."
          find . -mindepth 2 -name ".git" -type d -exec rm -rf {} + 2>/dev/null || true
          echo "📊 清理后可用空间:"
          df -h /

      - name: 清理 ABI 保护导出（防止编译报错）
        run: |
          cd kernel_workspace
          rm -f kernel_platform/common/android/abi_gki_protected_exports_* || true
          rm -f kernel_platform/msm-kernel/android/abi_gki_protected_exports_* || true

      - name: 移除 -dirty 后缀
        run: |
          cd kernel_workspace
          sed -i 's/ -dirty//g' kernel_platform/common/scripts/setlocalversion
          sed -i 's/ -dirty//g' kernel_platform/msm-kernel/scripts/setlocalversion

      # ========================================
      # 3. 集成 KernelSU Next
      # ========================================
      - name: 集成 KernelSU Next
        if: github.event.inputs.KERNELSU_ENABLED == 'true'
        run: |
          cd kernel_workspace/kernel_platform
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s ${{ github.event.inputs.KERNELSU_BRANCH }}

          cd KernelSU-Next
          KSU_VERSION=$(expr $(/usr/bin/git rev-list --count HEAD) "+" 10200)
          echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
          echo "✅ KernelSU Next 版本: $KSU_VERSION"
          sed -i "s/DKSU_VERSION=16/DKSU_VERSION=${KSU_VERSION}/" kernel/Makefile

      - name: 设置 KSU 版本（未启用时）
        if: github.event.inputs.KERNELSU_ENABLED != 'true'
        run: echo "KSUVER=none" >> $GITHUB_ENV

      # ========================================
      # 4. 自定义内核修改 (注入 Docker 灵魂核心)
      # ========================================
      - name: 注入 Docker 内核配置
        if: github.event.inputs.ENABLE_DOCKER == 'true'
        run: |
          cd kernel_workspace/kernel_platform

          # 参考 rvalyi/GKI-Custom 项目的做法：
          # Google 官方 GKI defconfig 显式禁用了 PID_NS 等选项（# CONFIG_PID_NS is not set）
          # 不能简单追加，必须用 sed 把禁用行替换为启用行，Kleaf 校验才能通过

          GKI_DEFCONFIG=$(find common/arch/arm64/configs -name "gki_defconfig" -type f | head -1)
          if [ -z "$GKI_DEFCONFIG" ]; then
            echo "❌ 未找到 gki_defconfig"
            exit 1
          fi
          echo "📍 找到 GKI defconfig: $GKI_DEFCONFIG"

          # === 方法1: sed 替换被显式禁用的选项 ===
          echo "🔧 替换 GKI defconfig 中被禁用的 Docker 必需选项..."

          # Namespaces（GKI 显式禁用了 PID_NS）
          sed -i 's/# CONFIG_PID_NS is not set/CONFIG_PID_NS=y/' "$GKI_DEFCONFIG"
          sed -i 's/# CONFIG_IPC_NS is not set/CONFIG_IPC_NS=y/' "$GKI_DEFCONFIG"
          sed -i 's/# CONFIG_USER_NS is not set/CONFIG_USER_NS=y/' "$GKI_DEFCONFIG"

          # Cgroups
          sed -i 's/# CONFIG_CGROUP_DEVICE is not set/CONFIG_CGROUP_DEVICE=y/' "$GKI_DEFCONFIG"
          sed -i 's/# CONFIG_CGROUP_PIDS is not set/CONFIG_CGROUP_PIDS=y/' "$GKI_DEFCONFIG"
          sed -i 's/# CONFIG_CGROUP_PERF is not set/CONFIG_CGROUP_PERF=y/' "$GKI_DEFCONFIG"
          sed -i 's/# CONFIG_CGROUP_HUGETLB is not set/CONFIG_CGROUP_HUGETLB=y/' "$GKI_DEFCONFIG"
          sed -i 's/# CONFIG_NET_CLS_CGROUP is not set/CONFIG_NET_CLS_CGROUP=y/' "$GKI_DEFCONFIG"
          sed -i 's/# CONFIG_CFS_BANDWIDTH is not set/CONFIG_CFS_BANDWIDTH=y/' "$GKI_DEFCONFIG"

          # Netfilter
          sed -i 's/# CONFIG_BRIDGE_NETFILTER is not set/CONFIG_BRIDGE_NETFILTER=y/' "$GKI_DEFCONFIG"
          sed -i 's/# CONFIG_NETFILTER_XT_MATCH_ADDRTYPE is not set/CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y/' "$GKI_DEFCONFIG"
          sed -i 's/# CONFIG_NETFILTER_XT_MATCH_IPVS is not set/CONFIG_NETFILTER_XT_MATCH_IPVS=y/' "$GKI_DEFCONFIG"
          sed -i 's/# CONFIG_IP6_NF_NAT is not set/CONFIG_IP6_NF_NAT=y/' "$GKI_DEFCONFIG"
          sed -i 's/# CONFIG_IP6_NF_TARGET_MASQUERADE is not set/CONFIG_IP6_NF_TARGET_MASQUERADE=y/' "$GKI_DEFCONFIG"

          # IPVS
          sed -i 's/# CONFIG_IP_VS is not set/CONFIG_IP_VS=y/' "$GKI_DEFCONFIG"
          sed -i 's/# CONFIG_IP_VS_NFCT is not set/CONFIG_IP_VS_NFCT=y/' "$GKI_DEFCONFIG"
          sed -i 's/# CONFIG_IP_VS_PROTO_TCP is not set/CONFIG_IP_VS_PROTO_TCP=y/' "$GKI_DEFCONFIG"
          sed -i 's/# CONFIG_IP_VS_PROTO_UDP is not set/CONFIG_IP_VS_PROTO_UDP=y/' "$GKI_DEFCONFIG"
          sed -i 's/# CONFIG_IP_VS_RR is not set/CONFIG_IP_VS_RR=y/' "$GKI_DEFCONFIG"

          # 文件系统与杂项
          sed -i 's/# CONFIG_POSIX_MQUEUE is not set/CONFIG_POSIX_MQUEUE=y/' "$GKI_DEFCONFIG"
          sed -i 's/# CONFIG_SYSVIPC is not set/CONFIG_SYSVIPC=y/' "$GKI_DEFCONFIG"

          # 网络驱动
          sed -i 's/# CONFIG_MACVLAN is not set/CONFIG_MACVLAN=y/' "$GKI_DEFCONFIG"
          sed -i 's/# CONFIG_IPVLAN is not set/CONFIG_IPVLAN=y/' "$GKI_DEFCONFIG"
          sed -i 's/# CONFIG_VXLAN is not set/CONFIG_VXLAN=y/' "$GKI_DEFCONFIG"
          sed -i 's/# CONFIG_DUMMY is not set/CONFIG_DUMMY=y/' "$GKI_DEFCONFIG"

          # === 方法2: 追加 defconfig 中完全不存在的选项 ===
          echo "🔧 追加 defconfig 中缺失的选项..."
          for cfg in \
            CONFIG_PID_NS=y CONFIG_IPC_NS=y CONFIG_USER_NS=y \
            CONFIG_CGROUP_DEVICE=y CONFIG_CGROUP_PIDS=y CONFIG_CGROUP_PERF=y \
            CONFIG_CGROUP_HUGETLB=y CONFIG_NET_CLS_CGROUP=y CONFIG_CFS_BANDWIDTH=y \
            CONFIG_BRIDGE_NETFILTER=y CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y \
            CONFIG_NETFILTER_XT_MATCH_IPVS=y CONFIG_IP6_NF_NAT=y \
            CONFIG_IP6_NF_TARGET_MASQUERADE=y \
            CONFIG_IP_VS=y CONFIG_IP_VS_NFCT=y CONFIG_IP_VS_PROTO_TCP=y \
            CONFIG_IP_VS_PROTO_UDP=y CONFIG_IP_VS_RR=y \
            CONFIG_POSIX_MQUEUE=y CONFIG_SYSVIPC=y \
            CONFIG_MACVLAN=y CONFIG_IPVLAN=y CONFIG_VXLAN=y CONFIG_DUMMY=y; do
            KEY=$(echo "$cfg" | cut -d= -f1)
            # 如果 sed 替换没有命中（选项不在文件中），则追加
            if ! grep -q "^${KEY}=" "$GKI_DEFCONFIG"; then
              echo "$cfg" >> "$GKI_DEFCONFIG"
              echo "  + 追加: $cfg"
            else
              echo "  ✓ 已存在: $KEY"
            fi
          done

          echo ""
          echo "📋 验证关键配置:"
          grep -E "PID_NS|IPC_NS|USER_NS|CGROUP_DEVICE|POSIX_MQUEUE" "$GKI_DEFCONFIG"

          # === Vendor defconfig 也注入模块级配置 ===
          echo ""
          echo "🔍 注入到 vendor defconfig..."
          VENDOR_CONF="docker_vendor.conf"
          {
            echo "# Docker/Container Support - Vendor"
            echo "CONFIG_BRIDGE_NETFILTER=y"
            echo "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y"
            echo "CONFIG_NETFILTER_XT_MATCH_IPVS=y"
            echo "CONFIG_IP6_NF_NAT=y"
            echo "CONFIG_IP6_NF_TARGET_MASQUERADE=y"
            echo "CONFIG_IP_VS=y"
            echo "CONFIG_IP_VS_NFCT=y"
            echo "CONFIG_IP_VS_PROTO_TCP=y"
            echo "CONFIG_IP_VS_PROTO_UDP=y"
            echo "CONFIG_IP_VS_RR=y"
            echo "CONFIG_MACVLAN=y"
            echo "CONFIG_IPVLAN=y"
            echo "CONFIG_VXLAN=y"
            echo "CONFIG_DUMMY=y"
            echo "CONFIG_POSIX_MQUEUE=y"
          } > "$VENDOR_CONF"
          find msm-kernel/arch/arm64/configs -type f \( -name "*pineapple*" -o -name "*sm7675*" \) -exec sh -c 'echo "" >> "$1"; cat docker_vendor.conf >> "$1"; echo "  ✅ vendor 已注入: $1"' _ {} \;

          echo "✅ Docker 配置注入完成（GKI sed 替换 + vendor 追加）"

      - name: 规范化 gki_defconfig（让 savedefconfig 检查自然通过）
        if: github.event.inputs.ENABLE_DOCKER == 'true'
        run: |
          cd kernel_workspace/kernel_platform

          # ===================================================================
          # 全新思路：不再尝试 patch .bzl 文件（已失败 5 次）
          # 而是用 make savedefconfig 规范化 defconfig 文件
          # 原理：
          #   1. make defconfig  → 从 gki_defconfig 生成完整的 .config
          #   2. make savedefconfig → 从 .config 生成最小化的 defconfig
          #   3. 用 savedefconfig 输出替换原始 gki_defconfig
          #   4. Kleaf 再跑一遍同样的流程，diff 结果一致 → 检查通过
          # ===================================================================

          GKI_DEFCONFIG="common/arch/arm64/configs/gki_defconfig"
          KDIR="common"
          OUT="/tmp/defconfig_normalize"
          
          echo "📍 原始 defconfig 行数: $(wc -l < $GKI_DEFCONFIG)"

          # 使用内核源码自带的预编译 clang 工具链
          CLANG_BIN=$(find prebuilts/clang/host/linux-x86 -maxdepth 2 -name "clang" -type f 2>/dev/null | head -1)
          if [ -n "$CLANG_BIN" ]; then
            CLANG_DIR=$(dirname "$CLANG_BIN")
            export PATH="$CLANG_DIR:$PATH"
            echo "🔧 使用工具链: $CLANG_DIR"
          fi

          mkdir -p "$OUT"

          echo "🔧 Step 1: make defconfig..."
          make -C "$KDIR" ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang HOSTCC=clang \
            O="$OUT" \
            gki_defconfig 2>&1 | tail -5

          echo "🔧 Step 2: make savedefconfig..."
          make -C "$KDIR" ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC=clang HOSTCC=clang \
            O="$OUT" \
            savedefconfig 2>&1 | tail -5

          if [ -f "$OUT/defconfig" ]; then
            echo "✅ savedefconfig 生成成功"
            echo "📍 规范化后行数: $(wc -l < $OUT/defconfig)"
            
            # 对比差异
            echo "📋 规范化前后差异（前10行）:"
            diff "$GKI_DEFCONFIG" "$OUT/defconfig" | head -30 || true
            
            # 用规范化后的 defconfig 替换原始文件
            cp "$OUT/defconfig" "$GKI_DEFCONFIG"
            echo "✅ gki_defconfig 已替换为规范化版本"
          else
            echo "⚠️ savedefconfig 未生成，尝试备用方案..."
            # 备用方案: 直接使用非交叉编译方式
            make -C "$KDIR" ARCH=arm64 O="$OUT" gki_defconfig 2>&1 | tail -3 || true
            make -C "$KDIR" ARCH=arm64 O="$OUT" savedefconfig 2>&1 | tail -3 || true
            if [ -f "$OUT/defconfig" ]; then
              cp "$OUT/defconfig" "$GKI_DEFCONFIG"
              echo "✅ 备用方案成功"
            else
              echo "❌ 无法规范化 defconfig，构建可能失败"
            fi
          fi

          rm -rf "$OUT"
          echo "✅ defconfig 规范化完成"

      # ========================================
      # 5. 编译内核
      # ========================================
      - name: 配置 Bazel 优化参数
        run: |
          cd kernel_workspace/kernel_platform
          {
            echo "build --reuse_sandbox_directories"
            echo "build --experimental_sandbox_async_tree_delete_idle_threads=0"
            echo "build --jobs=4"
            echo "build --verbose_failures"
          } > user.bazelrc

          echo "📋 user.bazelrc 内容:"
          cat user.bazelrc

      - name: 编译内核
        run: |
          cd kernel_workspace
          echo "🔨 开始编译内核..."
          mkdir -p "out/target/product/${{ github.event.inputs.CPUD }}"

          (
            while true; do 
              TIMESTAMP=$(date +"%H:%M:%S")
              MEM_INFO=$(free -h | grep Mem | awk '{print "已用:" $3 "/可用:" $7}')
              echo "📊 [$TIMESTAMP] 内存: $MEM_INFO"
              sleep 60
            done
          ) &
          MON_PID=$!

          export PATH="/usr/lib/ccache:$PATH"
          export USE_CCACHE=1
          export CCACHE_EXEC=/usr/bin/ccache
          export CCACHE_DIR="/home/runner/.ccache"
          export LTO=none
          export MAKEFLAGS="-j$(nproc)"
          
          stdbuf -oL ./kernel_platform/oplus/build/oplus_build_kernel.sh ${{ github.event.inputs.CPUD }} gki
          STATUS=$?

          kill $MON_PID 2>/dev/null || true
          exit $STATUS

      # ========================================
      # 6. 打包产物
      # ========================================
      - name: 验证编译产物
        run: |
          DIST_DIR="kernel_workspace/kernel_platform/out/msm-kernel-${{ github.event.inputs.CPUD }}-gki/dist"
          if [ ! -f "$DIST_DIR/Image" ]; then
            exit 1
          fi
          echo "✅ 内核 Image 编译成功"

      - name: 生成构建信息
        run: |
          BUILD_DATE=$(date -u +"%Y%m%d_%H%M%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          cat << EOF > build_info.txt
          OnePlus ACE 3V Kernel (Docker Enabled)
          =================================
          构建时间: $BUILD_DATE (UTC)
          设备: OnePlus ACE 3V
          KernelSU: ${{ github.event.inputs.KERNELSU_ENABLED }} (v${{ env.KSUVER }})
          Docker 支持: 强行注入开启
          EOF

      - name: 打包 AnyKernel3
        run: |
          git clone https://github.com/Kernel-SU/AnyKernel3 --depth=1
          rm -rf ./AnyKernel3/.git

          DIST_DIR="kernel_workspace/kernel_platform/out/msm-kernel-${{ github.event.inputs.CPUD }}-gki/dist"
          cp "$DIST_DIR/Image" ./AnyKernel3/
          if [ -f "$DIST_DIR/dtbo.img" ]; then
            cp "$DIST_DIR/dtbo.img" ./AnyKernel3/
          fi
          cp build_info.txt ./AnyKernel3/

          # 🚀 自动修复 AnyKernel3 的 init_boot 指向
          echo "⚙️ 正在修改 anykernel.sh 以适配一加 GKI 分区..."
          sed -i 's/block=boot;/block=init_boot;/g' ./AnyKernel3/anykernel.sh
          
          echo "✅ AnyKernel3 打包完成"

      # ========================================
      # 7. 上传产物
      # ========================================
      - name: 上传 AnyKernel3
        uses: actions/upload-artifact@v4
        with:
          name: AnyKernel3_ACE3V_Docker_KSU-${{ env.KSUVER }}_${{ env.BUILD_DATE }}
          path: ./AnyKernel3/*
          compression-level: 9
