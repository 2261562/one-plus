name: Build OnePlus ACE 3V Kernel

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: "Manifest 分支（SoC 平台）"
        required: true
        default: "sm7675"
        type: choice
        options:
          - sm7675

      MANIFEST_XML:
        description: "设备 Manifest XML（不含 .xml 后缀）"
        required: true
        default: "oneplus_ace_3v_b"
        type: choice
        options:
          - oneplus_ace_3v_b
          - oneplus_ace_3v_v

      CPUD:
        description: "处理器代号"
        required: true
        default: "pineapple"

      ANDROID_VERSION:
        description: "Android 版本（用于 KernelSU/补丁匹配）"
        required: true
        default: "android14"
        type: choice
        options:
          - android14
          - android15
          - android16

      KERNEL_VERSION:
        description: "内核版本"
        required: true
        default: "6.1"

      KERNELSU_ENABLED:
        description: "集成 KernelSU Next"
        required: true
        type: boolean
        default: false

      KERNELSU_BRANCH:
        description: "KernelSU Next 分支"
        required: true
        default: "next"

      APPLY_CUSTOM_PATCHES:
        description: "应用自定义补丁（patches/ 目录）"
        required: true
        type: boolean
        default: false

      APPLY_CUSTOM_DEFCONFIG:
        description: "应用自定义内核配置（config/custom_defconfig.fragment）"
        required: true
        type: boolean
        default: false

      ENABLE_DOCKER:
        description: "开启 Docker/容器 支持（内核配置）"
        required: true
        type: boolean
        default: true

jobs:
  build:
    name: "Build Kernel"
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      # ========================================
      # 1. 准备构建环境
      # ========================================
      - name: 最大化构建空间
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"

      - name: 额外清理磁盘空间
        run: |
          echo "🧹 正在清理额外的预装软件..."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost /usr/share/swift /usr/local/.ghcup
          sudo rm -rf /usr/local/share/chromium /usr/local/share/powershell
          sudo apt-get autoremove -y || true
          sudo apt-get clean || true
          echo "📊 清理后可用空间:"
          df -h /
      - name: 配置 Swap 分区
        run: |
          echo "🔍 正在清理残留 Docker 数据..."
          sudo docker image prune -a -f || true
          
          # 获取当前可用空间 (单位: GB)
          FREE_SPACE=$(df -BG / | tail -1 | awk '{print $4}' | sed 's/G//')
          echo "📊 当前根目录可用空间: ${FREE_SPACE}GB"
          # 根据空间动态决定 Swap 大小 (优先保留磁盘空间给编译)
          if [ "$FREE_SPACE" -gt 30 ]; then
            SWAP_SIZE="8G"
          elif [ "$FREE_SPACE" -gt 20 ]; then
            SWAP_SIZE="6G"
          else
            SWAP_SIZE="4G"
          fi
          echo "🔍 正在尝试创建 Swap 文件 ($SWAP_SIZE)..."
          # 优先使用 fallocate (快)，失败则回退到 dd
          sudo fallocate -l $SWAP_SIZE /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
          
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "✅ Swap 配置完成:"
          free -h
          df -h /
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 配置 Git
        run: |
          git config --global user.name "kernel-builder"
          git config --global user.email "builder@github.actions"
      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3 python-is-python3 git curl wget \
            bc bison build-essential ccache flex \
            libelf-dev libssl-dev libncurses-dev \
            zip unzip cpio procps htop
          # 清理 apt 缓存释放磁盘空间
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
      - name: 安装 repo 工具
        run: |
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo
          sudo mv ~/repo /usr/local/bin/repo
      # ========================================
      # 2. 拉取内核源码
      # ========================================
      - name: 初始化并同步内核源码
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          echo "::group::repo init"
          repo init \
            -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b refs/heads/oneplus/${{ github.event.inputs.MANIFEST_BRANCH }} \
            -m ${{ github.event.inputs.MANIFEST_XML }}.xml \
            --depth=1 \
            --repo-url=https://github.com/GerritCodeReview/git-repo.git
          echo "::endgroup::"
          echo "::group::repo sync"
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle --optimized-fetch
          echo "::endgroup::"
          # 在删除 .repo 之前，先生成 project.list 供 Bazel workspace status 脚本使用
          echo "📋 生成 project.list（Bazel workspace status 依赖此文件）..."
          repo list -f > project.list 2>/dev/null || repo list > project.list 2>/dev/null || echo "." > project.list
          # 关键优化：释放 .repo 目录占用的巨大空间 (通常 10GB+)
          echo "🗑️ 清理 .repo 目录..."
          rm -rf .repo
          # 清理源码中的 .git 目录，节约磁盘空间（保留顶层目录结构）
          echo "🗑️ 清理源码中的 .git 目录..."
          find . -mindepth 2 -name ".git" -type d -exec rm -rf {} + 2>/dev/null || true
          echo "📊 清理后可用空间:"
          df -h /
      - name: 清理 ABI 保护导出（防止编译报错）
        run: |
          cd kernel_workspace/kernel_platform

          # 删除 protected exports 文件，避免 symbol protection 检查阻塞构建
          echo "🔧 清理 ABI 保护导出文件..."
          find . -name "abi_gki_protected_exports_*" -type f -exec rm -f {} + 2>/dev/null || true

      - name: 规范化并添加 Docker 相关 KMI 符号
        if: github.event.inputs.ENABLE_DOCKER == 'true'
        run: |
          cd kernel_workspace/kernel_platform

          echo "🔧 规范化参与 pineapple_gki 的 KMI 符号表..."
          python3 <<'PY'
          from pathlib import Path
          import configparser
          import io

          docker_symbols = [
              "from_kuid",
              "from_kuid_munged",
              "make_kuid",
          ]

          targets = [
              Path("common/android/abi_gki_aarch64"),
              Path("msm-kernel/android/abi_gki_aarch64_qcom"),
          ]

          updated = []

          for path in targets:
              if not path.exists():
                  print(f"  ⚠️ 跳过不存在的文件: {path}")
                  continue

              raw_lines = path.read_text(encoding="utf-8").splitlines()
              normalized = []
              seen_symbols = set()
              has_header = False

              for line in raw_lines:
                  stripped = line.strip()
                  if not stripped:
                      if normalized and normalized[-1] != "":
                          normalized.append("")
                      continue
                  if stripped == "[abi_symbol_list]":
                      normalized.append(stripped)
                      has_header = True
                      continue
                  if stripped.startswith("#"):
                      normalized.append(stripped)
                      continue

                  seen_symbols.add(stripped)
                  normalized.append(f"  {stripped}")

              if not has_header:
                  print(f"  ⚠️ 跳过非 symbol list 文件: {path}")
                  continue

              if normalized and normalized[-1] != "":
                  normalized.append("")

              added = []
              for sym in docker_symbols:
                  if sym not in seen_symbols:
                      normalized.append(f"  {sym}")
                      added.append(sym)

              path.write_text("\n".join(normalized).rstrip("\n") + "\n", encoding="utf-8")
              updated.append(path)
              if added:
                  print(f"  ✅ 已补充 {path}: {', '.join(added)}")
              else:
                  print(f"  ✅ 已规范化 {path}（无需新增符号）")

          if not updated:
              raise SystemExit("未找到可更新的 KMI 符号表文件")

          # 用与 flatten_symbol_list 相同的 ConfigParser 参数先做一次格式校验
          merged = "\n".join(path.read_text(encoding="utf-8") for path in updated)
          sl = configparser.ConfigParser(allow_no_value=True, strict=False)
          sl.optionxform = str
          sl.read_file(io.StringIO(merged))
          print("  ✅ KMI 符号表格式校验通过")
          PY

          cd common && git add -A && git commit -m "Add Docker symbols to KMI list" || true
          cd ../msm-kernel && git add -A && git commit -m "Add Docker symbols to KMI list" || true
      - name: 移除 -dirty 后缀
        run: |
          cd kernel_workspace
          sed -i 's/ -dirty//g' kernel_platform/common/scripts/setlocalversion
          sed -i 's/ -dirty//g' kernel_platform/msm-kernel/scripts/setlocalversion
      # ========================================
      # 3. 集成 KernelSU Next
      # ========================================
      - name: 集成 KernelSU Next
        if: github.event.inputs.KERNELSU_ENABLED == 'true'
        run: |
          cd kernel_workspace/kernel_platform
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s ${{ github.event.inputs.KERNELSU_BRANCH }}
          # 计算并设置 KSU 版本号
          cd KernelSU-Next
          KSU_VERSION=$(expr $(/usr/bin/git rev-list --count HEAD) "+" 10200)
          echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
          echo "✅ KernelSU Next 版本: $KSU_VERSION"
          sed -i "s/DKSU_VERSION=16/DKSU_VERSION=${KSU_VERSION}/" kernel/Makefile
      - name: 设置 KSU 版本（未启用时）
        if: github.event.inputs.KERNELSU_ENABLED != 'true'
        run: echo "KSUVER=none" >> $GITHUB_ENV

      # ========================================
      # 4. 自定义内核修改（预留）
      # ========================================
      - name: 应用自定义补丁
        if: github.event.inputs.APPLY_CUSTOM_PATCHES == 'true'
        run: |
          cd kernel_workspace/kernel_platform
          PATCH_DIR="${GITHUB_WORKSPACE}/patches"
          if [ -d "$PATCH_DIR" ] && [ "$(ls -A $PATCH_DIR/*.patch 2>/dev/null)" ]; then
            echo "📦 发现自定义补丁，开始应用..."
            # 应用 common 内核补丁
            if ls "$PATCH_DIR"/common_*.patch 1>/dev/null 2>&1; then
              echo "  → 应用 common 内核补丁"
              cd common
              for patch in "$PATCH_DIR"/common_*.patch; do
                echo "    应用: $(basename $patch)"
                patch -p1 --forward < "$patch" || echo "⚠️ 补丁 $(basename $patch) 应用失败，跳过"
              done
              git add -A && git commit -m "Apply custom common patches" || true
              cd ..
            fi
            # 应用 msm-kernel 补丁
            if ls "$PATCH_DIR"/msm_*.patch 1>/dev/null 2>&1; then
              echo "  → 应用 msm-kernel 补丁"
              cd msm-kernel
              for patch in "$PATCH_DIR"/msm_*.patch; do
                echo "    应用: $(basename $patch)"
                patch -p1 --forward < "$patch" || echo "⚠️ 补丁 $(basename $patch) 应用失败，跳过"
              done
              git add -A && git commit -m "Apply custom msm-kernel patches" || true
              cd ..
            fi
            # 应用通用补丁（在 kernel_platform 根目录）
            if ls "$PATCH_DIR"/platform_*.patch 1>/dev/null 2>&1; then
              echo "  → 应用 kernel_platform 根目录补丁"
              for patch in "$PATCH_DIR"/platform_*.patch; do
                echo "    应用: $(basename $patch)"
                patch -p1 --forward < "$patch" || echo "⚠️ 补丁 $(basename $patch) 应用失败，跳过"
              done
            fi
            echo "✅ 自定义补丁应用完成"
          else
            echo "⚠️ patches/ 目录为空或不存在，跳过"
          fi
      - name: 应用 Docker/容器 内核配置
        if: github.event.inputs.ENABLE_DOCKER == 'true'
        run: |
          cd kernel_workspace/kernel_platform
          DOCKER_FRAGMENT="${GITHUB_WORKSPACE}/config/docker_defconfig.fragment"

          if [ ! -f "$DOCKER_FRAGMENT" ]; then
            echo "⚠️ config/docker_defconfig.fragment 不存在，跳过"
            exit 0
          fi

          echo "🐳 通过 Kleaf --defconfig_fragment 注入 Docker 配置..."

          # 将 fragment 复制到 common/ 目录下（Bazel sandbox 只能访问源码树内文件）
          cp "$DOCKER_FRAGMENT" common/docker.fragment
          cd common && git add -A && git commit -m "Add Docker defconfig fragment" || true
          echo "✅ Docker fragment 已放入 common/docker.fragment"
          echo "DOCKER_FRAGMENT_READY=true" >> $GITHUB_ENV
      - name: 应用自定义 defconfig fragment
        if: github.event.inputs.APPLY_CUSTOM_DEFCONFIG == 'true'
        run: |
          cd kernel_workspace/kernel_platform
          CUSTOM_FRAGMENT="${GITHUB_WORKSPACE}/config/custom_defconfig.fragment"
          if [ -f "$CUSTOM_FRAGMENT" ]; then
            echo "⚙️ 应用自定义 defconfig fragment..."
            DEFCONFIG_DIR="msm-kernel/arch/arm64/configs"
            VENDOR_DEFCONFIG=$(find "$DEFCONFIG_DIR" -name "*pineapple*" -o -name "*sm7675*" | head -1)
            if [ -n "$VENDOR_DEFCONFIG" ]; then
              echo "" >> "$VENDOR_DEFCONFIG"
              echo "# Custom Kernel Config" >> "$VENDOR_DEFCONFIG"
              cat "$CUSTOM_FRAGMENT" >> "$VENDOR_DEFCONFIG"
              echo "✅ 自定义配置已追加到: $VENDOR_DEFCONFIG"
            fi
            cd msm-kernel && git add -A && git commit -m "Apply custom defconfig" || true
            cd ../common && git add -A && git commit -m "Apply custom defconfig" || true
          else
            echo "⚠️ config/custom_defconfig.fragment 不存在，跳过"
          fi
      # ========================================
      # 5. 编译内核
      # ========================================
      - name: 配置 Bazel 优化参数
        run: |
          cd kernel_workspace/kernel_platform
          # 写入 user.bazelrc，Kleaf 构建系统会自动加载此文件
          # Kleaf 强制要求 sandbox 执行，不能用 --spawn_strategy=local
          # 因此通过优化 sandbox 行为来防止 processwrapper-sandbox 挂起
          {
            echo "# === 沙箱优化：防止 processwrapper-sandbox 挂起 ==="
            echo "# 复用沙箱目录，避免频繁创建/删除导致的 inode 耗尽和挂起"
            echo "build --reuse_sandbox_directories"
            echo "# 禁用异步沙箱目录删除，防止清理竞态条件导致挂起"
            echo "build --experimental_sandbox_async_tree_delete_idle_threads=0"
            echo ""
            echo "# === 资源限制 ==="
            echo "# 限制并行任务数，防止 CI 环境资源争用"
            echo "build --jobs=4"
            echo ""
            echo "# === 跳过 KMI 符号校验（自定义配置会引入新符号）==="
            echo "build --nokmi_symbol_list_strict_mode"
            echo ""
            echo "# === 调试辅助 ==="
            echo "build --verbose_failures"
          } > user.bazelrc

          # 如果启用了 Docker 支持，通过 Kleaf 官方机制注入 fragment
          if [ "$DOCKER_FRAGMENT_READY" = "true" ]; then
            echo "" >> user.bazelrc
            echo "# === Docker 内核配置 fragment ===" >> user.bazelrc
            echo "build --defconfig_fragment=//common:docker.fragment" >> user.bazelrc
            echo "🐳 已添加 --defconfig_fragment 到 user.bazelrc"
          fi
          echo "✅ user.bazelrc 已写入:"
          cat user.bazelrc
      - name: 编译内核
        run: |
          cd kernel_workspace
          echo "🔨 开始编译内核..."
          # 预先创建输出目录，修复 mktemp: No such file or directory 报错
          mkdir -p "out/target/product/${{ github.event.inputs.CPUD }}"
          # --- 优化后的实时资源监控 ---
          (
            echo "🚀 资源监控脚本已启动..."
            while true; do 
              TIMESTAMP=$(date +"%H:%M:%S")
              MEM_INFO=$(free -h | grep Mem | awk '{print "已用:" $3 "/可用:" $7}')
              SWAP_INFO=$(free -h | grep Swap | awk '{print "已用:" $3}')
              DISK_INFO=$(df -h / | tail -1 | awk '{print "可用:" $4}')
              LOAD=$(uptime | awk -F'load average:' '{ print $2 }' | xargs)
              echo "📊 [$TIMESTAMP] 内存: $MEM_INFO | Swap: $SWAP_INFO | 磁盘: $DISK_INFO | 负载: $LOAD"
              sleep 60
            done
          ) &
          MON_PID=$!
          # 配置 ccache 环境
          export PATH="/usr/lib/ccache:$PATH"
          export USE_CCACHE=1
          export CCACHE_EXEC=/usr/bin/ccache
          export CCACHE_DIR="/home/runner/.ccache"
          # 优化编译参数防止 OOM
          export LTO=none
          export MAKEFLAGS="-j$(nproc)"
          
          echo "  处理器核心数: $(nproc)"
          echo "  处理器代号: ${{ github.event.inputs.CPUD }}"
          echo "  配置文件: ${{ github.event.inputs.MANIFEST_XML }}"
          
          # 执行编译脚本 (使用 stdbuf 强制行缓冲输出，防止日志卡在缓冲区)
          stdbuf -oL ./kernel_platform/oplus/build/oplus_build_kernel.sh ${{ github.event.inputs.CPUD }} gki
          STATUS=$?
          # 编译完成后输出 ccache 命中情况
          echo "📊 ccache 统计:"
          ccache -s
          kill $MON_PID 2>/dev/null || true
          exit $STATUS
      - name: 导出构建错误日志
        if: failure()
        run: |
          cd kernel_workspace/kernel_platform
          echo "=========================================="
          echo "📋 收集构建错误日志..."
          echo "=========================================="

          # 1. Bazel 错误日志
          echo ""
          echo "--- Bazel command.log ---"
          BAZEL_OUTPUT=$(find out/bazel -name "command.log" 2>/dev/null | head -1)
          if [ -n "$BAZEL_OUTPUT" ]; then
            tail -200 "$BAZEL_OUTPUT"
          else
            echo "(未找到 command.log)"
          fi

          # 2. KernelConfig 相关日志
          echo ""
          echo "--- KernelConfig 错误日志 ---"
          find out/bazel -path "*kernel_aarch64_config*" -name "*.log" 2>/dev/null | while read f; do
            echo "=== $f ==="
            tail -100 "$f"
          done

          # 3. 查找 sandbox 中的错误输出
          echo ""
          echo "--- Sandbox stderr ---"
          find out/bazel -path "*kernel_aarch64_config*" -name "stderr" 2>/dev/null | while read f; do
            echo "=== $f ==="
            cat "$f"
          done

          # 4. 检查 .config 生成情况
          echo ""
          echo "--- 查找已生成的 .config ---"
          find out -name ".config" -type f 2>/dev/null | head -5

          # 5. 当前 gki_defconfig 状态
          echo ""
          echo "--- gki_defconfig 行数和头部 ---"
          GKI="common/arch/arm64/configs/gki_defconfig"
          if [ -f "$GKI" ]; then
            wc -l "$GKI"
            head -20 "$GKI"
          fi

          # 6. KMI symbol list 产物
          echo ""
          echo "--- KMI abi_symbollist 产物 ---"
          find out/bazel -path "*kmi_symbol_list*/abi_symbollist" -type f 2>/dev/null | while read f; do
            echo "=== $f ==="
            sed -n '1,160p' "$f"
          done

          # 7. Bazel server 日志
          echo ""
          echo "--- Bazel server jvm.out (尾部) ---"
          find out/bazel -name "jvm.out" 2>/dev/null | while read f; do
            echo "=== $f ==="
            tail -50 "$f"
          done
      - name: 上传错误日志
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-logs
          path: |
            kernel_workspace/kernel_platform/out/bazel/**/command.log
            kernel_workspace/kernel_platform/out/bazel/**/*kernel_aarch64_config*
          retention-days: 3
          if-no-files-found: warn
      # 6. 打包产物
      # ========================================
      - name: 验证编译产物
        run: |
          DIST_DIR="kernel_workspace/kernel_platform/out/msm-kernel-${{ github.event.inputs.CPUD }}-gki/dist"
          if [ ! -f "$DIST_DIR/Image" ]; then
            echo "❌ 编译失败：未找到 Image 文件"
            echo "尝试在其他目录查找..."
            find kernel_workspace/kernel_platform/out -name "Image" -type f 2>/dev/null || true
            exit 1
          fi
          echo "✅ 内核 Image 编译成功"
          ls -lh "$DIST_DIR/Image"
      - name: 生成构建信息
        run: |
          BUILD_DATE=$(date -u +"%Y%m%d_%H%M%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          # 生成构建摘要
          cat << EOF > build_info.txt
          =================================
          OnePlus ACE 3V Kernel Build Info
          =================================
          构建时间: $BUILD_DATE (UTC)
          设备: OnePlus ACE 3V
          SoC: Snapdragon 7+ Gen 3 (SM7675)
          Manifest: ${{ github.event.inputs.MANIFEST_XML }}
          处理器代号: ${{ github.event.inputs.CPUD }}
          Android 版本: ${{ github.event.inputs.ANDROID_VERSION }}
          内核版本: ${{ github.event.inputs.KERNEL_VERSION }}
          KernelSU: ${{ github.event.inputs.KERNELSU_ENABLED }} (版本: ${{ env.KSUVER }})
          Docker 支持: ${{ github.event.inputs.ENABLE_DOCKER }}
          自定义补丁: ${{ github.event.inputs.APPLY_CUSTOM_PATCHES }}
          自定义 Defconfig: ${{ github.event.inputs.APPLY_CUSTOM_DEFCONFIG }}
          =================================
          EOF
          cat build_info.txt
      - name: 打包 AnyKernel3
        run: |
          git clone https://github.com/Kernel-SU/AnyKernel3 --depth=1
          rm -rf ./AnyKernel3/.git
          # 复制内核 Image
          DIST_DIR="kernel_workspace/kernel_platform/out/msm-kernel-${{ github.event.inputs.CPUD }}-gki/dist"
          cp "$DIST_DIR/Image" ./AnyKernel3/
          # 复制 dtbo（如果存在）
          if [ -f "$DIST_DIR/dtbo.img" ]; then
            cp "$DIST_DIR/dtbo.img" ./AnyKernel3/
            echo "✅ 已包含 dtbo.img"
          fi
          # 添加构建信息
          cp build_info.txt ./AnyKernel3/
          echo "✅ AnyKernel3 打包完成"
          ls -la ./AnyKernel3/
      # ========================================
      # 7. 上传产物
      # ========================================
      - name: 上传 AnyKernel3
        uses: actions/upload-artifact@v4
        with:
          name: AnyKernel3_ACE3V_KSU-${{ env.KSUVER }}_${{ env.BUILD_DATE }}
          path: ./AnyKernel3/*
          compression-level: 9

      - name: 生成构建摘要
        run: |
          echo "## 🎉 OnePlus ACE 3V 内核编译完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 配置项 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 设备 | OnePlus ACE 3V |" >> $GITHUB_STEP_SUMMARY
          echo "| Manifest | \`${{ github.event.inputs.MANIFEST_XML }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| KernelSU | ${{ github.event.inputs.KERNELSU_ENABLED }} (v${{ env.KSUVER }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker | ${{ github.event.inputs.ENABLE_DOCKER }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 构建时间 | ${{ env.BUILD_DATE }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 请在 Artifacts 中下载 AnyKernel3 ZIP" >> $GITHUB_STEP_SUMMARY
