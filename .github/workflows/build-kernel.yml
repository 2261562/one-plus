name: Build OnePlus ACE 3V Kernel

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: "Manifest 分支（SoC 平台）"
        required: true
        default: "sm7675"
        type: choice
        options:
          - sm7675

      MANIFEST_XML:
        description: "设备 Manifest XML（不含 .xml 后缀）"
        required: true
        default: "oneplus_ace_3v_b"
        type: choice
        options:
          - oneplus_ace_3v_b
          - oneplus_ace_3v_v

      CPUD:
        description: "处理器代号"
        required: true
        default: "pineapple"

      ANDROID_VERSION:
        description: "Android 版本（用于 KernelSU/补丁匹配）"
        required: true
        default: "android14"
        type: choice
        options:
          - android14
          - android15
          - android16

      KERNEL_VERSION:
        description: "内核版本"
        required: true
        default: "6.1"

      KERNELSU_ENABLED:
        description: "集成 KernelSU Next"
        required: true
        type: boolean
        default: true

      KERNELSU_BRANCH:
        description: "KernelSU Next 分支"
        required: true
        default: "next"

      APPLY_CUSTOM_PATCHES:
        description: "应用自定义补丁（patches/ 目录）"
        required: true
        type: boolean
        default: false

      APPLY_CUSTOM_DEFCONFIG:
        description: "应用自定义内核配置（config/custom_defconfig.fragment）"
        required: true
        type: boolean
        default: false

      ENABLE_DOCKER:
        description: "开启 Docker/容器 支持（内核配置）"
        required: true
        type: boolean
        default: true

jobs:
  build:
    name: "Build Kernel"
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      # ========================================
      # 1. 准备构建环境
      # ========================================
      - name: 最大化构建空间
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"

      - name: 额外清理磁盘空间
        run: |
          echo "🧹 正在清理额外的预装软件..."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost /usr/share/swift /usr/local/.ghcup
          sudo rm -rf /usr/local/share/chromium /usr/local/share/powershell
          sudo apt-get autoremove -y || true
          sudo apt-get clean || true
          echo "📊 清理后可用空间:"
          df -h /

      - name: 配置 Swap 分区
        run: |
          echo "🔍 正在清理残留 Docker 数据..."
          sudo docker image prune -a -f || true
          
          FREE_SPACE=$(df -BG / | tail -1 | awk '{print $4}' | sed 's/G//')
          echo "📊 当前根目录可用空间: ${FREE_SPACE}GB"

          if [ "$FREE_SPACE" -gt 30 ]; then
            SWAP_SIZE="8G"
          elif [ "$FREE_SPACE" -gt 20 ]; then
            SWAP_SIZE="6G"
          else
            SWAP_SIZE="4G"
          fi

          echo "🔍 正在尝试创建 Swap 文件 ($SWAP_SIZE)..."
          sudo fallocate -l $SWAP_SIZE /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
          
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "✅ Swap 配置完成:"
          free -h
          df -h /

      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 配置 Git
        run: |
          git config --global user.name "kernel-builder"
          git config --global user.email "builder@github.actions"

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3 python-is-python3 git curl wget \
            bc bison build-essential ccache flex \
            libelf-dev libssl-dev libncurses-dev \
            zip unzip cpio procps htop
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: 安装 repo 工具
        run: |
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo
          sudo mv ~/repo /usr/local/bin/repo

      # ========================================
      # 2. 拉取内核源码
      # ========================================
      - name: 初始化并同步内核源码
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          echo "::group::repo init"
          repo init \
            -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b refs/heads/oneplus/${{ github.event.inputs.MANIFEST_BRANCH }} \
            -m ${{ github.event.inputs.MANIFEST_XML }}.xml \
            --depth=1 \
            --repo-url=https://github.com/GerritCodeReview/git-repo.git
          echo "::endgroup::"

          echo "::group::repo sync"
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle --optimized-fetch
          echo "::endgroup::"

          echo "📋 生成 project.list（Bazel workspace status 依赖此文件）..."
          repo list -f > project.list 2>/dev/null || repo list > project.list 2>/dev/null || echo "." > project.list

          echo "🗑️ 清理 .repo 目录..."
          rm -rf .repo

          echo "🗑️ 清理源码中的 .git 目录..."
          find . -mindepth 2 -name ".git" -type d -exec rm -rf {} + 2>/dev/null || true
          echo "📊 清理后可用空间:"
          df -h /

      - name: 清理 ABI 保护导出（防止编译报错）
        run: |
          cd kernel_workspace
          rm -f kernel_platform/common/android/abi_gki_protected_exports_* || true
          rm -f kernel_platform/msm-kernel/android/abi_gki_protected_exports_* || true

      - name: 移除 -dirty 后缀
        run: |
          cd kernel_workspace
          sed -i 's/ -dirty//g' kernel_platform/common/scripts/setlocalversion
          sed -i 's/ -dirty//g' kernel_platform/msm-kernel/scripts/setlocalversion

      # ========================================
      # 3. 集成 KernelSU Next
      # ========================================
      - name: 集成 KernelSU Next
        if: github.event.inputs.KERNELSU_ENABLED == 'true'
        run: |
          cd kernel_workspace/kernel_platform
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s ${{ github.event.inputs.KERNELSU_BRANCH }}

          cd KernelSU-Next
          KSU_VERSION=$(expr $(/usr/bin/git rev-list --count HEAD) "+" 10200)
          echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
          echo "✅ KernelSU Next 版本: $KSU_VERSION"
          sed -i "s/DKSU_VERSION=16/DKSU_VERSION=${KSU_VERSION}/" kernel/Makefile

      - name: 设置 KSU 版本（未启用时）
        if: github.event.inputs.KERNELSU_ENABLED != 'true'
        run: echo "KSUVER=none" >> $GITHUB_ENV

      # ========================================
      # 4. 自定义内核修改 (注入 Docker 灵魂核心)
      # ========================================
      - name: 注入 Docker 内核配置
        if: github.event.inputs.ENABLE_DOCKER == 'true'
        run: |
          cd kernel_workspace/kernel_platform

          # 生成配置片段（用 echo 逐行写入，避免 heredoc 缩进导致前导空格）
          DOCKER_CONF="docker_reqs.conf"
          {
            echo "# Docker/Container Support"
            echo "# --- Namespaces ---"
            echo "CONFIG_NAMESPACES=y"
            echo "CONFIG_NET_NS=y"
            echo "CONFIG_PID_NS=y"
            echo "CONFIG_IPC_NS=y"
            echo "CONFIG_UTS_NS=y"
            echo "CONFIG_USER_NS=y"
            echo "# --- Cgroups ---"
            echo "CONFIG_CGROUPS=y"
            echo "CONFIG_CGROUP_CPUACCT=y"
            echo "CONFIG_CGROUP_DEVICE=y"
            echo "CONFIG_CGROUP_FREEZER=y"
            echo "CONFIG_CGROUP_SCHED=y"
            echo "CONFIG_CPUSETS=y"
            echo "CONFIG_MEMCG=y"
            echo "CONFIG_CGROUP_PIDS=y"
            echo "CONFIG_CGROUP_BPF=y"
            echo "CONFIG_CGROUP_PERF=y"
            echo "CONFIG_CGROUP_HUGETLB=y"
            echo "CONFIG_NET_CLS_CGROUP=y"
            echo "CONFIG_CFS_BANDWIDTH=y"
            echo "CONFIG_FAIR_GROUP_SCHED=y"
            echo "# --- Netfilter ---"
            echo "CONFIG_VETH=y"
            echo "CONFIG_BRIDGE=y"
            echo "CONFIG_BRIDGE_NETFILTER=y"
            echo "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y"
            echo "CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y"
            echo "CONFIG_NETFILTER_XT_MATCH_IPVS=y"
            echo "CONFIG_IP_NF_NAT=y"
            echo "CONFIG_IP6_NF_NAT=y"
            echo "CONFIG_IP6_NF_TARGET_MASQUERADE=y"
            echo "CONFIG_NF_NAT=y"
            echo "CONFIG_IP_VS=y"
            echo "CONFIG_IP_VS_NFCT=y"
            echo "CONFIG_IP_VS_PROTO_TCP=y"
            echo "CONFIG_IP_VS_PROTO_UDP=y"
            echo "CONFIG_IP_VS_RR=y"
            echo "CONFIG_IP_SCTP=y"
            echo "# --- Filesystem & Misc ---"
            echo "CONFIG_OVERLAY_FS=y"
            echo "CONFIG_POSIX_MQUEUE=y"
            echo "CONFIG_DUMMY=y"
            echo "CONFIG_MACVLAN=y"
            echo "CONFIG_IPVLAN=y"
            echo "CONFIG_VXLAN=y"
          } > "$DOCKER_CONF"

          echo "📋 生成的配置片段（验证无前导空格）:"
          cat -A "$DOCKER_CONF" | head -5

          # 方法1：追加到 defconfig 文件
          echo "🔍 注入到 defconfig 文件..."
          find common/arch/arm64/configs -type f -name "*gki_defconfig" -exec sh -c 'echo "" >> "$1"; cat docker_reqs.conf >> "$1"; echo "  ✅ 已注入: $1"' _ {} \;
          find msm-kernel/arch/arm64/configs -type f \( -name "*pineapple*" -o -name "*sm7675*" \) -exec sh -c 'echo "" >> "$1"; cat docker_reqs.conf >> "$1"; echo "  ✅ 已注入: $1"' _ {} \;

          # 方法2：创建 post_defconfig 钩子脚本（用 scripts/config 强制启用）
          # 这是最可靠的方式，在 .config 生成后强制修改
          HOOK_SCRIPT="docker_post_defconfig.sh"
          {
            echo '#!/bin/bash'
            echo '# 在 .config 生成后，用 scripts/config 强制启用 Docker 配置'
            echo 'SCRIPTS_CONFIG=""'
            echo 'for d in common msm-kernel; do'
            echo '  if [ -f "$d/scripts/config" ]; then'
            echo '    SCRIPTS_CONFIG="$d/scripts/config"'
            echo '    break'
            echo '  fi'
            echo 'done'
            echo ''
            echo 'if [ -z "$SCRIPTS_CONFIG" ]; then'
            echo '  echo "⚠️ scripts/config 未找到，跳过 post_defconfig 强制注入"'
            echo '  exit 0'
            echo 'fi'
            echo ''
            echo '# 查找所有已生成的 .config 文件'
            echo 'find out -name ".config" -type f 2>/dev/null | while read cfg; do'
            echo '  echo "🔧 强制注入 Docker 配置到: $cfg"'
            echo '  $SCRIPTS_CONFIG --file "$cfg" \\'
            echo '    -e NAMESPACES -e NET_NS -e PID_NS -e IPC_NS -e UTS_NS -e USER_NS \\'
            echo '    -e CGROUPS -e CGROUP_CPUACCT -e CGROUP_DEVICE -e CGROUP_FREEZER \\'
            echo '    -e CGROUP_SCHED -e CPUSETS -e MEMCG -e CGROUP_PIDS -e CGROUP_BPF \\'
            echo '    -e CGROUP_PERF -e CGROUP_HUGETLB -e NET_CLS_CGROUP \\'
            echo '    -e CFS_BANDWIDTH -e FAIR_GROUP_SCHED \\'
            echo '    -e VETH -e BRIDGE -e BRIDGE_NETFILTER \\'
            echo '    -e NETFILTER_XT_MATCH_ADDRTYPE -e NETFILTER_XT_MATCH_CONNTRACK \\'
            echo '    -e NETFILTER_XT_MATCH_IPVS \\'
            echo '    -e IP_NF_NAT -e IP6_NF_NAT -e IP6_NF_TARGET_MASQUERADE -e NF_NAT \\'
            echo '    -e IP_VS -e IP_VS_NFCT -e IP_VS_PROTO_TCP -e IP_VS_PROTO_UDP -e IP_VS_RR \\'
            echo '    -e IP_SCTP \\'
            echo '    -e OVERLAY_FS -e POSIX_MQUEUE -e DUMMY -e MACVLAN -e IPVLAN -e VXLAN'
            echo '  echo "  ✅ 完成: $cfg"'
            echo 'done'
          } > "$HOOK_SCRIPT"
          chmod +x "$HOOK_SCRIPT"

          echo "✅ Docker 配置注入准备完成"

      - name: Patch 构建脚本注入 Docker 配置
        if: github.event.inputs.ENABLE_DOCKER == 'true'
        run: |
          cd kernel_workspace/kernel_platform

          # 找到 scripts/config 工具的路径
          SCRIPTS_CONFIG=""
          for d in common msm-kernel; do
            if [ -f "$d/scripts/config" ]; then
              SCRIPTS_CONFIG="\${ROOT_DIR}/$d/scripts/config"
              echo "📍 找到 scripts/config: $d/scripts/config"
              break
            fi
          done

          if [ -z "$SCRIPTS_CONFIG" ]; then
            echo "⚠️ 未找到 scripts/config，跳过构建脚本 patch"
            exit 0
          fi

          # 构造要注入的 scripts/config 命令
          INJECT_CMD="$SCRIPTS_CONFIG --file \${OUT_DIR}/.config"
          INJECT_CMD="$INJECT_CMD -e NAMESPACES -e NET_NS -e PID_NS -e IPC_NS -e UTS_NS -e USER_NS"
          INJECT_CMD="$INJECT_CMD -e CGROUPS -e CGROUP_CPUACCT -e CGROUP_DEVICE -e CGROUP_FREEZER"
          INJECT_CMD="$INJECT_CMD -e CGROUP_SCHED -e CPUSETS -e MEMCG -e CGROUP_PIDS -e CGROUP_BPF"
          INJECT_CMD="$INJECT_CMD -e CGROUP_PERF -e CGROUP_HUGETLB -e NET_CLS_CGROUP"
          INJECT_CMD="$INJECT_CMD -e CFS_BANDWIDTH -e FAIR_GROUP_SCHED"
          INJECT_CMD="$INJECT_CMD -e VETH -e BRIDGE -e BRIDGE_NETFILTER"
          INJECT_CMD="$INJECT_CMD -e NETFILTER_XT_MATCH_ADDRTYPE -e NETFILTER_XT_MATCH_CONNTRACK"
          INJECT_CMD="$INJECT_CMD -e NETFILTER_XT_MATCH_IPVS"
          INJECT_CMD="$INJECT_CMD -e IP_NF_NAT -e IP6_NF_NAT -e IP6_NF_TARGET_MASQUERADE -e NF_NAT"
          INJECT_CMD="$INJECT_CMD -e IP_VS -e IP_VS_NFCT -e IP_VS_PROTO_TCP -e IP_VS_PROTO_UDP -e IP_VS_RR"
          INJECT_CMD="$INJECT_CMD -e IP_SCTP"
          INJECT_CMD="$INJECT_CMD -e OVERLAY_FS -e POSIX_MQUEUE -e DUMMY -e MACVLAN -e IPVLAN -e VXLAN"

          # 在 build_utils.sh 的 make olddefconfig 之后注入
          BUILD_UTILS="build/kernel/build_utils.sh"
          if [ -f "$BUILD_UTILS" ]; then
            echo "🔧 Patching $BUILD_UTILS ..."
            # 在 olddefconfig 之后追加 Docker 配置注入
            sed -i "/make.*olddefconfig/a\\
          # Docker config injection\\
          echo \"🐳 注入 Docker 内核配置...\"; ${INJECT_CMD} 2>/dev/null || true" "$BUILD_UTILS"
            echo "✅ build_utils.sh 已 patch"
          fi

          # 同时 patch common/build.config.* 中的 POST_DEFCONFIG_CMDS（如果存在）
          for f in common/build.config.gki common/build.config.gki.aarch64; do
            if [ -f "$f" ]; then
              echo "" >> "$f"
              echo "# Docker post_defconfig hook" >> "$f"
              echo "POST_DEFCONFIG_CMDS=\"${INJECT_CMD}; make -C \${KERNEL_DIR} O=\${OUT_DIR} olddefconfig\"" >> "$f"
              echo "✅ 已追加到: $f"
            fi
          done

          echo "✅ 构建脚本 patch 完成"

      # ========================================
      # 5. 编译内核
      # ========================================
      - name: 配置 Bazel 优化参数
        run: |
          cd kernel_workspace/kernel_platform
          {
            echo "build --reuse_sandbox_directories"
            echo "build --experimental_sandbox_async_tree_delete_idle_threads=0"
            echo "build --jobs=4"
            echo "build --verbose_failures"
          } > user.bazelrc

      - name: 编译内核
        run: |
          cd kernel_workspace
          echo "🔨 开始编译内核..."
          mkdir -p "out/target/product/${{ github.event.inputs.CPUD }}"

          (
            while true; do 
              TIMESTAMP=$(date +"%H:%M:%S")
              MEM_INFO=$(free -h | grep Mem | awk '{print "已用:" $3 "/可用:" $7}')
              echo "📊 [$TIMESTAMP] 内存: $MEM_INFO"
              sleep 60
            done
          ) &
          MON_PID=$!

          export PATH="/usr/lib/ccache:$PATH"
          export USE_CCACHE=1
          export CCACHE_EXEC=/usr/bin/ccache
          export CCACHE_DIR="/home/runner/.ccache"
          export LTO=none
          export MAKEFLAGS="-j$(nproc)"
          
          stdbuf -oL ./kernel_platform/oplus/build/oplus_build_kernel.sh ${{ github.event.inputs.CPUD }} gki
          STATUS=$?

          kill $MON_PID 2>/dev/null || true
          exit $STATUS

      # ========================================
      # 6. 打包产物
      # ========================================
      - name: 验证编译产物
        run: |
          DIST_DIR="kernel_workspace/kernel_platform/out/msm-kernel-${{ github.event.inputs.CPUD }}-gki/dist"
          if [ ! -f "$DIST_DIR/Image" ]; then
            exit 1
          fi
          echo "✅ 内核 Image 编译成功"

      - name: 生成构建信息
        run: |
          BUILD_DATE=$(date -u +"%Y%m%d_%H%M%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          cat << EOF > build_info.txt
          OnePlus ACE 3V Kernel (Docker Enabled)
          =================================
          构建时间: $BUILD_DATE (UTC)
          设备: OnePlus ACE 3V
          KernelSU: ${{ github.event.inputs.KERNELSU_ENABLED }} (v${{ env.KSUVER }})
          Docker 支持: 强行注入开启
          EOF

      - name: 打包 AnyKernel3
        run: |
          git clone https://github.com/Kernel-SU/AnyKernel3 --depth=1
          rm -rf ./AnyKernel3/.git

          DIST_DIR="kernel_workspace/kernel_platform/out/msm-kernel-${{ github.event.inputs.CPUD }}-gki/dist"
          cp "$DIST_DIR/Image" ./AnyKernel3/
          if [ -f "$DIST_DIR/dtbo.img" ]; then
            cp "$DIST_DIR/dtbo.img" ./AnyKernel3/
          fi
          cp build_info.txt ./AnyKernel3/

          # 🚀 自动修复 AnyKernel3 的 init_boot 指向
          echo "⚙️ 正在修改 anykernel.sh 以适配一加 GKI 分区..."
          sed -i 's/block=boot;/block=init_boot;/g' ./AnyKernel3/anykernel.sh
          
          echo "✅ AnyKernel3 打包完成"

      # ========================================
      # 7. 上传产物
      # ========================================
      - name: 上传 AnyKernel3
        uses: actions/upload-artifact@v4
        with:
          name: AnyKernel3_ACE3V_Docker_KSU-${{ env.KSUVER }}_${{ env.BUILD_DATE }}
          path: ./AnyKernel3/*
          compression-level: 9
