name: OnePlus Ace 3V Docker Kernel

on:
  workflow_dispatch:
    # 手动触发编译

env:
  # ================= 核心配置区域 =================
  # 请替换为你的实际 Ace 3V 内核源码仓库和分支
  KERNEL_SOURCE: 'https://github.com/你的用户名/android_kernel_oneplus_sm7675'
  KERNEL_BRANCH: 'android-14'
  # OnePlus Ace 3V (骁龙7+ Gen3) 通常基于 pineapple 架构
  KERNEL_DEFCONFIG: 'vendor/pineapple_defconfig'
  KERNEL_IMAGE_NAME: 'Image'
  KBUILD_BUILD_USER: 'DockerBuilder'
  KBUILD_BUILD_HOST: 'GitHub-Action'
  # =================================================

jobs:
  build:
    name: Build Ace 3V Kernel
    runs-on: ubuntu-22.04

    steps:
      - name: 初始化编译环境
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update && sudo apt-get upgrade -y
          sudo ln -fs /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
          sudo apt-get install -y tzdata
          # 安装必要的依赖，增加 zstd 和 llvm 基础依赖（适应 GKI 内核）
          sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev bc python3-pip python3-dev python3-full wget lld binutils-aarch64-linux-gnu zstd
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: 拉取内核源码
        run: |
          git clone --depth=1 -b ${{ env.KERNEL_BRANCH }} ${{ env.KERNEL_SOURCE }} kernel_workspace

      - name: 下载 Clang 18 工具链 (适配较新内核)
        run: |
          cd kernel_workspace
          mkdir -p clang
          echo "正在下载 ZyCromerZ Clang 18..."
          wget -q https://github.com/ZyCromerZ/Clang/releases/download/18.0.0-20231125-release/Clang-18.0.0-20231125.tar.gz -O clang.tar.gz
          tar -xzf clang.tar.gz -C clang
          rm -f clang.tar.gz
          echo "Clang 版本信息:"
          ./clang/bin/clang --version

      - name: ⚙️ 注入 Docker 与 LXC 核心配置
        run: |
          cd kernel_workspace
          cat << 'EOF' > enable_docker.sh
          #!/bin/bash
          CONFIG_FILE="$1"
          if [ ! -f "$CONFIG_FILE" ]; then echo "Error: Config file not found!"; exit 1; fi
          echo "Injecting COMPREHENSIVE Docker configs into $CONFIG_FILE..."
          
          # --- 禁用 LTO 以加速编译并减少报错 ---
          sed -i 's/CONFIG_LTO=y/CONFIG_LTO=n/' "$CONFIG_FILE"
          sed -i 's/CONFIG_LTO_CLANG=y/CONFIG_LTO_CLANG=n/' "$CONFIG_FILE"
          sed -i 's/CONFIG_LTO_CLANG_THIN=y/CONFIG_LTO_CLANG_THIN=n/' "$CONFIG_FILE"
          sed -i 's/CONFIG_THINLTO=y/CONFIG_THINLTO=n/' "$CONFIG_FILE"
          echo "CONFIG_LTO_NONE=y" >> "$CONFIG_FILE"

          # --- 注入完整 Docker 运行环境支持 ---
          cat << CFG >> "$CONFIG_FILE"

          # [核心 Cgroup 与调度]
          CONFIG_CGROUP_SCHED=y
          CONFIG_FAIR_GROUP_SCHED=y
          CONFIG_MEMCG=y
          CONFIG_MEMCG_SWAP=y
          CONFIG_MEMCG_SWAP_ENABLED=y
          CONFIG_MEMCG_KMEM=y
          CONFIG_BLK_CGROUP=y
          CONFIG_BLK_DEV_THROTTLING=y
          CONFIG_CPUSETS=y
          CONFIG_PROC_PID_CPUSET=y
          CONFIG_CGROUPS=y
          CONFIG_CGROUP_DEVICE=y
          CONFIG_CGROUP_CPUACCT=y
          CONFIG_CGROUP_FREEZER=y
          CONFIG_CGROUP_PIDS=y
          CONFIG_CGROUP_BPF=y

          # [命名空间 Namespaces]
          CONFIG_NAMESPACES=y
          CONFIG_NET_NS=y
          CONFIG_PID_NS=y
          CONFIG_IPC_NS=y
          CONFIG_UTS_NS=y
          CONFIG_USER_NS=y

          # [网络支持 (Bridge, VETH, IPTables)]
          CONFIG_VETH=y
          CONFIG_BRIDGE=y
          CONFIG_BRIDGE_NETFILTER=y
          CONFIG_IP_NF_FILTER=y
          CONFIG_IP_NF_TARGET_MASQUERADE=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
          CONFIG_NETFILTER_XT_MATCH_IPVS=y
          CONFIG_IP_VS=y
          CONFIG_IP_VS_NFCT=y
          CONFIG_IP_VS_RR=y
          CONFIG_IPVLAN=y
          CONFIG_MACVLAN=y
          CONFIG_DUMMY=y

          # [文件系统安全 (OverlayFS)]
          CONFIG_OVERLAY_FS=y
          CONFIG_KEYS=y
          CONFIG_SECCOMP=y
          CONFIG_SECCOMP_FILTER=y
          CONFIG_POSIX_MQUEUE=y

          CFG
          echo "Docker configuration injected."
          EOF
          chmod +x enable_docker.sh

      - name: 配置与编译内核
        run: |
          cd kernel_workspace
          export PATH=$(pwd)/clang/bin:$PATH
          export ARCH=arm64
          export SUBARCH=arm64
          
          # 生成基础配置
          make O=out CC=clang ${{ env.KERNEL_DEFCONFIG }}
          
          # 注入 Docker 支持
          ./enable_docker.sh out/.config
          
          # 整理配置
          make O=out CC=clang olddefconfig
          
          # 二次强制检查关键依赖
          if ! grep -q "CONFIG_CGROUP_DEVICE=y" out/.config; then
              echo "CONFIG_CGROUP_DEVICE=y" >> out/.config
              make O=out CC=clang olddefconfig
          fi
          
          # 开始编译 (引入 LLVM=1 和 LLVM_IAS=1 适应现代 GKI 编译)
          make -j$(nproc --all) O=out \
            CC="ccache clang" \
            LLVM=1 \
            LLVM_IAS=1 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            Image dtbs

      - name: 打包刷机包 (AnyKernel3)
        run: |
          cd kernel_workspace
          git clone https://github.com/osm0sis/AnyKernel3
          rm -rf AnyKernel3/.git* AnyKernel3/README.md AnyKernel3/ramdisk AnyKernel3/modules AnyKernel3/patch
          
          # 复制镜像
          if [ -f out/arch/arm64/boot/${{ env.KERNEL_IMAGE_NAME }} ]; then
              cp out/arch/arm64/boot/${{ env.KERNEL_IMAGE_NAME }} AnyKernel3/
          else
              echo "Error: Kernel Image not found!"
              exit 1
          fi
          
          # 复制 DTB (如有)
          if [ -f out/arch/arm64/boot/dtb ]; then
              cp out/arch/arm64/boot/dtb AnyKernel3/
          elif [ -f out/arch/arm64/boot/dtbo.img ]; then
              cp out/arch/arm64/boot/dtbo.img AnyKernel3/
          fi

          cd AnyKernel3
          
          # Ace 3V A/B 分区适配
          sed -i '/block=/d' anykernel.sh
          # 高通设备的 boot 分区通常在这个路径
          sed -i '2i block=/dev/block/bootdevice/by-name/boot;' anykernel.sh
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          # 开启 A/B 槽位自动识别
          sed -i 's/is_slot_device=0/is_slot_device=1/g' anykernel.sh
          sed -i 's/kernel.string=zImage/kernel.string=Image/g' anykernel.sh
          
          zip -r9 ../OnePlus-Ace3V-Docker-Kernel.zip * -x .git README.md *placeholder

      - name: 上传内核产物
        uses: actions/upload-artifact@v4
        with:
          name: OnePlus-Ace3V-Docker-Kernel
          path: kernel_workspace/OnePlus-Ace3V-Docker-Kernel.zip
